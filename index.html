<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abigail Bergen Fan Site</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page {
      text-align: center;
      width: 100%;
      padding: 20px;
      box-sizing: border-box;
    }

    .video-wrap {
      max-width: 960px;
      margin: 0 auto;
      aspect-ratio: 16 / 9;
    }

    #player {
      width: 100%;
      height: 100%;
      min-height: 270px;
    }

    p {
      margin-top: 18px;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="video-wrap">
      <div id="player"></div>
    </div>
    <p>If the video does not start automatically, click play.</p>
  </div>

  <script>
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    var player;

    function onYouTubeIframeAPIReady() {
      player = new YT.Player('player', {
        videoId: 'D97Q0B-SGb8',
        playerVars: {
          autoplay: 1,
          controls: 1,
          playsinline: 1
        },
        events: {
          onReady: onPlayerReady
        }
      });
    }

    function onPlayerReady(event) {
      event.target.mute();
      event.target.playVideo();
    }
  </script>
</body>
</html>
